<div class="layout-container">
  <header class="site-header">
    <a class="home-link" routerLink="/" aria-label="Island Outdoor Home">
      <div class="logo-section">
        <div class="logo-icon">
          <span class="material-symbols-outlined">landscape</span>
        </div>
        <h2 class="brand-name">Island Outdoor</h2>
      </div>
    </a>
    <div class="nav-section">
      <a routerLink="/signup"
        ><button type="button" class="btn btn-primary">
          <span>Sign Up </span>
        </button></a
      >
    </div>
  </header>

  <main class="main-content">
    <div class="bg-overlay"></div>
    <div class="content-wrapper">
      <div class="login-card">
        <div class="login-header">
          <h1 class="login-title">Welcome Back</h1>
          <p class="login-subtitle">
            Sign in to access your outdoor adventure gear.
          </p>
        </div>

        <div class="social-login">
          <button type="button" class="btn btn-social">
            <span class="material-symbols-outlined icon-google">public</span>
            Continue with Google
          </button>
        </div>

        <div class="divider">
          <div class="divider-line"></div>
          <span class="divider-text">or</span>
          <div class="divider-line"></div>
        </div>

        <form class="login-form" (ngSubmit)="onSubmit($event)">
          <div class="form-group">
            <label class="form-label" for="loginEmail">Email Address</label>
            <input
              id="loginEmail"
              name="email"
              class="form-input"
              placeholder="e.g. wanderer@jamaica.com"
              type="email"
              [(ngModel)]="email"
              required />
          </div>

          <div class="form-group">
            <div class="label-row">
              <label class="form-label" for="loginPassword">Password</label>
              <a class="link-small" routerLink="/contact">Forgot password?</a>
            </div>
            <div class="input-wrapper">
              <input
                id="loginPassword"
                name="password"
                class="form-input"
                placeholder="••••••••"
                [type]="passwordInputType"
                [(ngModel)]="password"
                required />
              <button
                class="btn-icon"
                type="button"
                (click)="togglePassword()">
                <span class="material-symbols-outlined">visibility</span>
              </button>
            </div>
          </div>

          <div class="checkbox-group">
            <input class="checkbox-input" id="remember" type="checkbox" />
            <label class="checkbox-label" for="remember"
              >Keep me logged in</label
            >
          </div>

          <button class="btn btn-full" type="submit">Sign In</button>
        </form>

        <div class="signup-prompt">
          <p>
            Don't have an account?
            <a class="link-primary" routerLink="/signup">Create an account</a>
          </p>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-content">
      <span>© 2026 Island Outdoor Jamaica Ltd.</span>
      <span class="separator">•</span>
      <a class="footer-link" routerLink="/privacy">Privacy Policy</a>
      <span class="separator">•</span>
      <a class="footer-link" routerLink="/privacy">Terms of Service</a>
      <span class="separator">•</span>
      <a class="footer-link" routerLink="/contact">Help Center</a>
    </div>
  </footer>
</div>
